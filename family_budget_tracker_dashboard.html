<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Budget Tracker</title>
    <!-- Tailwind CSS สำหรับ Design Modern/Plain -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js สำหรับ Dashboard -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- FontAwesome สำหรับ Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fafafa; }
        .glass-card { background: #ffffff; border: 1px solid #f0f0f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02); }
    </style>
</head>
<body class="text-gray-800 antialiased pb-20">

    <!-- Header -->
    <header class="bg-white border-b border-gray-100 sticky top-0 z-10 px-6 py-4 flex justify-between items-center shadow-sm">
        <h1 class="text-xl font-semibold tracking-tight"><i class="fa-solid fa-wallet mr-2 text-black"></i>Family Budget</h1>
        <div class="text-sm text-gray-500" id="currentDate"></div>
    </header>

    <main class="max-w-3xl mx-auto p-4 mt-4">
        
        <!-- Tab Navigation -->
        <div class="flex bg-gray-100 p-1 rounded-xl mb-6">
            <button onclick="switchTab('dashboard')" id="tab-dashboard" class="flex-1 py-2 rounded-lg text-sm font-medium transition-all bg-white shadow-sm">Dashboard</button>
            <button onclick="switchTab('add')" id="tab-add" class="flex-1 py-2 rounded-lg text-sm font-medium text-gray-500 transition-all hover:text-black">เพิ่มรายการ</button>
        </div>

        <!-- ================= DASHBOARD VIEW ================= -->
        <div id="view-dashboard" class="space-y-6">
            <!-- Summary Cards -->
            <div class="grid grid-cols-2 gap-4">
                <div class="glass-card rounded-2xl p-5">
                    <p class="text-sm text-gray-500 mb-1">รายรับเดือนนี้</p>
                    <h3 class="text-2xl font-semibold text-green-600">฿<span id="income-total">0</span></h3>
                </div>
                <div class="glass-card rounded-2xl p-5">
                    <p class="text-sm text-gray-500 mb-1">รายจ่ายเดือนนี้</p>
                    <h3 class="text-2xl font-semibold text-red-500">฿<span id="expense-total">0</span></h3>
                </div>
            </div>

            <!-- Chart -->
            <div class="glass-card rounded-2xl p-5">
                <h3 class="text-md font-medium mb-4">สัดส่วนค่าใช้จ่าย (เดือนนี้)</h3>
                <div class="relative h-64 w-full">
                    <canvas id="expenseChart"></canvas>
                </div>
            </div>

            <button onclick="fetchData()" class="w-full py-3 bg-gray-50 hover:bg-gray-100 text-gray-600 rounded-xl text-sm transition-colors border border-gray-200">
                <i class="fa-solid fa-rotate-right mr-2"></i>รีเฟรชข้อมูล
            </button>
        </div>

        <!-- ================= ADD RECORD VIEW ================= -->
        <div id="view-add" class="hidden">
            <div class="glass-card rounded-2xl p-6">
                <form id="recordForm" class="space-y-5">
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm text-gray-500 mb-1">ประเภท</label>
                            <select id="type" class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:border-black focus:ring-1 focus:ring-black bg-gray-50" required>
                                <option value="expense">รายจ่าย</option>
                                <option value="income">รายรับ</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-500 mb-1">หมวดหมู่</label>
                            <select id="category" class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:border-black focus:ring-1 focus:ring-black bg-gray-50" required>
                                <option value="อาหาร">อาหาร/เครื่องดื่ม</option>
                                <option value="เดินทาง">เดินทาง</option>
                                <option value="บิล">ค่าน้ำ/ไฟ/เน็ต</option>
                                <option value="ของใช้ในบ้าน">ของใช้ในบ้าน</option>
                                <option value="รายได้">รายได้/เงินเดือน</option>
                                <option value="อื่นๆ">อื่นๆ</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm text-gray-500 mb-1">จำนวนเงิน (บาท)</label>
                        <input type="number" id="amount" placeholder="0.00" class="w-full p-3 border border-gray-200 rounded-xl text-xl font-semibold focus:outline-none focus:border-black focus:ring-1 focus:ring-black bg-gray-50" required>
                    </div>

                    <div>
                        <label class="block text-sm text-gray-500 mb-1">สมาชิกครอบครัวที่ทำรายการ</label>
                        <select id="user" class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:border-black focus:ring-1 focus:ring-black bg-gray-50" required>
                            <!-- เปลี่ยนชื่อคนในครอบครัวตรงนี้ได้เลย -->
                            <option value="พ่อ">คุณพ่อ</option>
                            <option value="แม่">คุณแม่</option>
                            <option value="ลูก">ลูก</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm text-gray-500 mb-1">บันทึกเพิ่มเติม (ถ้ามี)</label>
                        <input type="text" id="note" placeholder="เช่น ค่าทางด่วน, ข้าวมันไก่..." class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:border-black focus:ring-1 focus:ring-black bg-gray-50">
                    </div>

                    <button type="submit" id="submitBtn" class="w-full py-4 bg-black text-white font-medium rounded-xl hover:bg-gray-800 transition-all shadow-md mt-6">
                        บันทึกข้อมูล
                    </button>
                </form>
            </div>
        </div>

    </main>

    <!-- JS Logic -->
    <script>
        // !!!!!!!!!!! เอา URL จาก Google Apps Script (Deploy Web App) มาใส่ตรงนี้ !!!!!!!!!!!
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwnvVJ2iOo9BF6as7STXPBFECfLUzCQO_4NLHgM1EbXSRWRHUmyfspOsQ1wpA2ttHAzOg/exec';
        
        let chartInstance = null;

        // Set Date in Header
        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('th-TH', options);

        // Tab Switching Logic
        function switchTab(tab) {
            if (tab === 'dashboard') {
                document.getElementById('view-dashboard').classList.remove('hidden');
                document.getElementById('view-add').classList.add('hidden');
                document.getElementById('tab-dashboard').classList.add('bg-white', 'shadow-sm', 'text-black');
                document.getElementById('tab-dashboard').classList.remove('text-gray-500');
                document.getElementById('tab-add').classList.remove('bg-white', 'shadow-sm', 'text-black');
                document.getElementById('tab-add').classList.add('text-gray-500');
                fetchData(); // โหลดข้อมูลใหม่เมื่อเปิดหน้า Dashboard
            } else {
                document.getElementById('view-dashboard').classList.add('hidden');
                document.getElementById('view-add').classList.remove('hidden');
                document.getElementById('tab-add').classList.add('bg-white', 'shadow-sm', 'text-black');
                document.getElementById('tab-add').classList.remove('text-gray-500');
                document.getElementById('tab-dashboard').classList.remove('bg-white', 'shadow-sm', 'text-black');
                document.getElementById('tab-dashboard').classList.add('text-gray-500');
            }
        }

        // Submit Form Logic
        document.getElementById('recordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>กำลังบันทึก...';
            btn.disabled = true;

            const data = {
                date: new Date().toISOString(),
                type: document.getElementById('type').value,
                category: document.getElementById('category').value,
                amount: parseFloat(document.getElementById('amount').value),
                user: document.getElementById('user').value,
                note: document.getElementById('note').value
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(resData => {
                alert('บันทึกข้อมูลเรียบร้อยแล้ว!');
                document.getElementById('recordForm').reset();
                btn.innerHTML = 'บันทึกข้อมูล';
                btn.disabled = false;
                switchTab('dashboard'); // กลับไปหน้า Dashboard
            })
            .catch(error => {
                console.error('Error!', error.message);
                alert('เกิดข้อผิดพลาด กรุณาลองใหม่');
                btn.innerHTML = 'บันทึกข้อมูล';
                btn.disabled = false;
            });
        });

        // Fetch Data for Dashboard
        function fetchData() {
            if(SCRIPT_URL === 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL_HERE') return; // กัน Error ถ้ายังไม่ใส่ URL

            fetch(SCRIPT_URL)
                .then(res => res.json())
                .then(data => {
                    processDashboardData(data);
                });
        }

        function processDashboardData(data) {
            let totalIncome = 0;
            let totalExpense = 0;
            let categoryTotals = {};

            const currentMonth = new Date().getMonth();
            const currentYear = new Date().getFullYear();

            data.forEach(row => {
                const rowDate = new Date(row.date);
                // กรองเฉพาะข้อมูลเดือนนี้
                if (rowDate.getMonth() === currentMonth && rowDate.getFullYear() === currentYear) {
                    if (row.type === 'income') {
                        totalIncome += Number(row.amount);
                    } else if (row.type === 'expense') {
                        totalExpense += Number(row.amount);
                        // จัดกลุ่มค่าใช้จ่ายตามหมวดหมู่
                        categoryTotals[row.category] = (categoryTotals[row.category] || 0) + Number(row.amount);
                    }
                }
            });

            // อัพเดทตัวเลขบนหน้าจอ
            document.getElementById('income-total').innerText = totalIncome.toLocaleString();
            document.getElementById('expense-total').innerText = totalExpense.toLocaleString();

            // อัพเดทกราฟ
            renderChart(categoryTotals);
        }

        // Render Chart.js
        function renderChart(categoryTotals) {
            const ctx = document.getElementById('expenseChart').getContext('2d');
            const labels = Object.keys(categoryTotals);
            const dataValues = Object.values(categoryTotals);

            if (chartInstance) {
                chartInstance.destroy();
            }

            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels.length > 0 ? labels : ['ไม่มีข้อมูล'],
                    datasets: [{
                        data: dataValues.length > 0 ? dataValues : [1],
                        backgroundColor: dataValues.length > 0 ? [
                            '#111827', // Black
                            '#4b5563', // Gray-600
                            '#9ca3af', // Gray-400
                            '#e5e7eb', // Gray-200
                            '#f3f4f6'  // Gray-100
                        ] : ['#f3f4f6'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { usePointStyle: true, padding: 20 } }
                    },
                    cutout: '70%'
                }
            });
        }

        // Initialize Mock Chart (ให้เห็นหน้าตาก่อนดึงข้อมูลจริง)
        window.onload = () => {
            renderChart({'อาหาร': 5000, 'เดินทาง': 2000, 'บิล': 1500});
        };
    </script>
</body>
</html>
