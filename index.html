<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Budget Tracker</title>
    <!-- Tailwind CSS สำหรับ Design Modern/Plain -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js สำหรับ Dashboard -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- FontAwesome สำหรับ Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fafafa; }
        .glass-card { background: #ffffff; border: 1px solid #f0f0f0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background-color: #e5e7eb; border-radius: 10px; }
        /* เอฟเฟกต์ตอนกดรายการ */
        .transaction-row:active { transform: scale(0.99); }
    </style>
</head>
<body class="text-gray-800 antialiased pb-20">

    <!-- Header -->
    <header class="bg-white border-b border-gray-100 sticky top-0 z-10 px-6 py-4 flex justify-between items-center shadow-sm">
        <h1 class="text-xl font-semibold tracking-tight"><i class="fa-solid fa-wallet mr-2 text-black"></i>Family Budget</h1>
        <div class="text-sm text-gray-500" id="currentDate"></div>
    </header>

    <main class="max-w-3xl mx-auto p-4 mt-4">
        
        <!-- Tab Navigation -->
        <div class="flex bg-gray-100 p-1 rounded-xl mb-6 shadow-inner">
            <button onclick="switchTab('dashboard')" id="tab-dashboard" class="flex-1 py-2 rounded-lg text-sm font-medium transition-all bg-white shadow-sm text-black">Dashboard</button>
            <button onclick="switchTab('add')" id="tab-add" class="flex-1 py-2 rounded-lg text-sm font-medium text-gray-500 transition-all hover:text-black">เพิ่ม/แก้ไขรายการ</button>
        </div>

        <!-- ================= DASHBOARD VIEW ================= -->
        <div id="view-dashboard" class="space-y-6">
            
            <!-- เลือกเดือน -->
            <div class="flex justify-between items-center bg-white p-3 rounded-xl border border-gray-200">
                <label class="text-sm font-medium text-gray-600"><i class="fa-regular fa-calendar-days mr-2"></i>เลือกเดือน</label>
                <div class="flex gap-2">
                    <select id="monthSelect" class="p-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-black font-medium">
                        <option value="01">มกราคม</option>
                        <option value="02">กุมภาพันธ์</option>
                        <option value="03">มีนาคม</option>
                        <option value="04">เมษายน</option>
                        <option value="05">พฤษภาคม</option>
                        <option value="06">มิถุนายน</option>
                        <option value="07">กรกฎาคม</option>
                        <option value="08">สิงหาคม</option>
                        <option value="09">กันยายน</option>
                        <option value="10">ตุลาคม</option>
                        <option value="11">พฤศจิกายน</option>
                        <option value="12">ธันวาคม</option>
                    </select>
                    <select id="yearSelect" class="p-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-black font-medium">
                        <option value="2024">2024</option>
                        <option value="2025">2025</option>
                        <option value="2026">2026</option>
                    </select>
                </div>
            </div>

            <!-- Summary Section -->
            <div>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div class="glass-card rounded-2xl p-5">
                        <p class="text-sm text-gray-500 mb-1">รายรับ</p>
                        <h3 class="text-2xl font-semibold text-green-600">฿<span id="income-total">0</span></h3>
                    </div>
                    <div class="glass-card rounded-2xl p-5">
                        <p class="text-sm text-gray-500 mb-1">รายจ่าย</p>
                        <h3 class="text-2xl font-semibold text-red-500">฿<span id="expense-total">0</span></h3>
                    </div>
                </div>
                <!-- สถานะคงเหลือ -->
                <div id="balance-card" class="glass-card rounded-2xl p-5 flex items-center justify-between border-l-4 border-gray-400">
                    <div>
                        <p class="text-sm text-gray-500 mb-1">สถานะคงเหลือ (รายรับ - รายจ่าย)</p>
                        <h3 class="text-xl font-bold text-gray-800" id="net-balance">฿0</h3>
                    </div>
                    <div id="balance-icon" class="w-10 h-10 rounded-full flex items-center justify-center text-lg bg-gray-100 text-gray-600">
                        <i class="fa-solid fa-equals"></i>
                    </div>
                </div>
            </div>

            <!-- Chart: Daily Trend (Stacked) -->
            <div class="glass-card rounded-2xl p-5">
                <h3 class="text-md font-medium mb-4">รายจ่ายรายวัน (บาท)</h3>
                <div class="relative h-64 w-full">
                    <canvas id="dailyChart"></canvas>
                </div>
            </div>

            <!-- Chart: Category Donut & Breakdown -->
            <div class="glass-card rounded-2xl p-5">
                <h3 class="text-md font-medium mb-4">สัดส่วนค่าใช้จ่ายตามหมวดหมู่</h3>
                <div class="relative h-56 w-full mb-6">
                    <canvas id="expenseChart"></canvas>
                </div>
                <div id="categoryList" class="space-y-2"></div>
            </div>

            <!-- Transaction Details -->
            <div class="glass-card rounded-2xl p-5">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-md font-medium">รายการบันทึก (เดือนนี้)</h3>
                    <span class="text-xs text-gray-400 bg-gray-100 px-2 py-1 rounded">แตะเพื่อแก้ไข</span>
                </div>
                <div id="transactionDetails" class="space-y-3">
                    <!-- รายการจะถูกสร้างด้วย JS -->
                </div>
            </div>

            <button onclick="fetchData()" class="w-full py-3 bg-gray-50 hover:bg-gray-100 text-gray-600 rounded-xl text-sm transition-colors border border-gray-200">
                <i class="fa-solid fa-rotate-right mr-2"></i>รีเฟรชข้อมูล
            </button>
        </div>

        <!-- ================= ADD / EDIT RECORD VIEW ================= -->
        <div id="view-add" class="hidden">
            <div class="glass-card rounded-2xl p-6">
                <h2 id="formTitle" class="text-lg font-bold mb-4 text-gray-800 border-b pb-2">เพิ่มรายการใหม่</h2>
                
                <form id="recordForm" class="space-y-5">
                    
                    <div>
                        <label class="block text-sm text-gray-500 mb-1">วันที่ทำรายการ</label>
                        <input type="date" id="recordDate" class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:border-black focus:ring-1 focus:ring-black bg-gray-50" required>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm text-gray-500 mb-1">ประเภท</label>
                            <select id="type" class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:border-black focus:ring-1 focus:ring-black bg-gray-50" required>
                                <option value="expense">รายจ่าย</option>
                                <option value="income">รายรับ</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm text-gray-500 mb-1">หมวดหมู่</label>
                            <select id="category" class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:border-black focus:ring-1 focus:ring-black bg-gray-50" required>
                                <option value="อาหาร">อาหาร/เครื่องดื่ม</option>
                                <option value="เดินทาง">เดินทาง</option>
                                <option value="บิล">ค่าน้ำ/ไฟ/เน็ต</option>
                                <option value="ของใช้ในบ้าน">ของใช้ในบ้าน</option>
                                <option value="ของใช้ส่วนตัว">ของใช้ส่วนตัว</option>
                                <option value="ประกันชีวิต/สุขภาพ">ประกันชีวิต/สุขภาพ</option>
                                <option value="ประกันรถ">ประกันรถ</option>
                                <option value="ผ่อนรถ">ผ่อนรถ</option>
                                <option value="ผ่อนบ้าน/คอนโด">ผ่อนบ้าน/คอนโด</option>
                                <option value="รายได้">รายได้/เงินเดือน</option>
                                <option value="อื่นๆ">อื่นๆ</option>
                            </select>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm text-gray-500 mb-1">จำนวนเงิน (บาท)</label>
                        <input type="number" id="amount" placeholder="0.00" step="0.01" class="w-full p-3 border border-gray-200 rounded-xl text-xl font-semibold focus:outline-none focus:border-black focus:ring-1 focus:ring-black bg-gray-50" required>
                    </div>

                    <div>
                        <label class="block text-sm text-gray-500 mb-1">สมาชิกที่ทำรายการ</label>
                        <select id="user" class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:border-black focus:ring-1 focus:ring-black bg-gray-50" required>
                            <option value="คุณพ่อ-ส่วนตัว">คุณพ่อ-ส่วนตัว</option>
                            <option value="คุณแม่-ส่วนตัว">คุณแม่-ส่วนตัว</option>
                            <option value="คุณลูก-ส่วนตัว">คุณลูก-ส่วนตัว</option>
                            <option value="ครอบครัว-ส่วนรวม">ครอบครัว-ส่วนรวม</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm text-gray-500 mb-1">บันทึกเพิ่มเติม (ถ้ามี)</label>
                        <input type="text" id="note" placeholder="เช่น ค่าทางด่วน, ข้าวมันไก่..." class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:border-black focus:ring-1 focus:ring-black bg-gray-50">
                    </div>

                    <div class="flex gap-3 mt-6">
                        <button type="button" id="cancelEditBtn" onclick="resetFormMode()" class="hidden flex-1 py-4 bg-gray-200 text-gray-700 font-medium rounded-xl hover:bg-gray-300 transition-all shadow-sm">
                            ยกเลิก
                        </button>
                        <button type="submit" id="submitBtn" class="flex-[2] py-4 bg-black text-white font-medium rounded-xl hover:bg-gray-800 transition-all shadow-md">
                            บันทึกข้อมูล
                        </button>
                    </div>
                </form>
            </div>
        </div>

    </main>

    <!-- JS Logic -->
    <script>
        // !!!!!!!!!!! เอา URL จาก Google Apps Script มาใส่ตรงนี้ !!!!!!!!!!!
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxrYqnKabCoWGlloKT_7jCHPTzWwz8baPNeM0ox0g-pYr_h_rem38HfoXOl0V7z9aWBEQ/exec';
        
        let donutChartInstance = null;
        let barChartInstance = null;
        let allData = []; 
        
        // ตัวแปรสำหรับเช็คสถานะการแก้ไข
        let editMode = false;
        let editRowId = null;

        const headerOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('th-TH', headerOptions);

        const today = new Date();
        const localDateString = today.toLocaleDateString('en-CA'); 
        document.getElementById('recordDate').value = localDateString;
        
        const currentMonthString = String(today.getMonth() + 1).padStart(2, '0');
        const currentYearString = today.getFullYear().toString();
        
        document.getElementById('monthSelect').value = currentMonthString;
        document.getElementById('yearSelect').value = currentYearString;

        document.getElementById('monthSelect').addEventListener('change', renderDashboard);
        document.getElementById('yearSelect').addEventListener('change', renderDashboard);

        function switchTab(tab) {
            if (tab === 'dashboard') {
                document.getElementById('view-dashboard').classList.remove('hidden');
                document.getElementById('view-add').classList.add('hidden');
                
                document.getElementById('tab-dashboard').classList.add('bg-white', 'shadow-sm', 'text-black');
                document.getElementById('tab-dashboard').classList.remove('text-gray-500');
                
                document.getElementById('tab-add').classList.remove('bg-white', 'shadow-sm', 'text-black');
                document.getElementById('tab-add').classList.add('text-gray-500');
                
                if(allData.length === 0) fetchData(); 
            } else {
                document.getElementById('view-dashboard').classList.add('hidden');
                document.getElementById('view-add').classList.remove('hidden');
                
                document.getElementById('tab-add').classList.add('bg-white', 'shadow-sm', 'text-black');
                document.getElementById('tab-add').classList.remove('text-gray-500');
                
                document.getElementById('tab-dashboard').classList.remove('bg-white', 'shadow-sm', 'text-black');
                document.getElementById('tab-dashboard').classList.add('text-gray-500');
            }
        }

        function resetFormMode() {
            editMode = false;
            editRowId = null;
            document.getElementById('recordForm').reset();
            document.getElementById('recordDate').value = localDateString;
            
            document.getElementById('formTitle').innerText = 'เพิ่มรายการใหม่';
            document.getElementById('submitBtn').innerHTML = 'บันทึกข้อมูล';
            document.getElementById('cancelEditBtn').classList.add('hidden');
        }

        // ฟังก์ชันดึงข้อมูลเข้าฟอร์มเมื่อกดเลือกที่ตาราง
        function editRecord(sheetRow) {
            const record = allData.find(r => r.sheetRow === sheetRow);
            if (!record) return;

            // แปลงรูปแบบวันที่ให้ฟอร์มรู้จัก (YYYY-MM-DD)
            const d = new Date(record.date);
            document.getElementById('recordDate').value = d.toLocaleDateString('en-CA');
            document.getElementById('type').value = record.type;
            document.getElementById('category').value = record.category;
            document.getElementById('amount').value = record.amount;
            document.getElementById('user').value = record.user || 'ครอบครัว-ส่วนรวม';
            document.getElementById('note').value = record.note || '';

            // เปิดโหมดแก้ไข
            editMode = true;
            editRowId = sheetRow;
            
            document.getElementById('formTitle').innerText = `แก้ไขรายการ (แถวที่ ${sheetRow})`;
            document.getElementById('submitBtn').innerHTML = '<i class="fa-solid fa-pen mr-2"></i>อัปเดตข้อมูล';
            document.getElementById('cancelEditBtn').classList.remove('hidden');

            switchTab('add');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // กดปุ่มบันทึก/อัปเดต
        document.getElementById('recordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>กำลังดำเนินการ...';
            btn.disabled = true;

            const selectedDate = new Date(document.getElementById('recordDate').value);

            // แนบพารามิเตอร์ action ไปด้วยเพื่อให้ Google Apps Script รู้ว่าเป็นการอัปเดตหรือเพิ่มใหม่
            const data = {
                action: editMode ? 'update' : 'add', 
                row: editRowId, 
                date: selectedDate.toISOString(),
                type: document.getElementById('type').value,
                category: document.getElementById('category').value,
                amount: parseFloat(document.getElementById('amount').value),
                user: document.getElementById('user').value,
                note: document.getElementById('note').value
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(resData => {
                alert(editMode ? 'อัปเดตรายการเรียบร้อยแล้ว!' : 'บันทึกข้อมูลเรียบร้อยแล้ว!');
                resetFormMode(); 
                btn.disabled = false;
                
                fetchData(); 
                switchTab('dashboard'); 
            })
            .catch(error => {
                console.error('Error!', error.message);
                alert('เกิดข้อผิดพลาด กรุณาลองใหม่');
                btn.innerHTML = originalText;
                btn.disabled = false;
            });
        });

        // ดึงข้อมูล
        function fetchData() {
            const btn = document.querySelector('button[onclick="fetchData()"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>กำลังโหลด...';

            fetch(SCRIPT_URL)
                .then(res => res.json())
                .then(data => {
                    // แนบหมายเลขแถว (Row) ของ Google Sheets ไปด้วย เพื่อใช้เป็น ID ตอนแก้ไข
                    // สมมติว่าข้อมูลที่ส่งมาจาก GAS เริ่มต้นที่แถว 2 (แถว 1 คือ Header)
                    allData = data.map((item, index) => {
                        return { ...item, sheetRow: index + 2 };
                    }); 
                    
                    renderDashboard(); 
                    btn.innerHTML = originalText;
                })
                .catch(err => {
                    console.error('Fetch Error:', err);
                    btn.innerHTML = originalText;
                });
        }

        // ประมวลผลและแสดงผลกราฟ/ตัวเลข บน Dashboard
        function renderDashboard() {
            const filterMonth = document.getElementById('monthSelect').value;
            const filterYear = document.getElementById('yearSelect').value;
            
            let totalIncome = 0;
            let totalExpense = 0;
            let categoryTotals = {};
            let dailyCategoryTotals = {};
            const daysInMonth = new Date(filterYear, filterMonth, 0).getDate();
            
            for (let i = 1; i <= daysInMonth; i++) {
                dailyCategoryTotals[i] = {};
            }

            let monthlyTransactions = []; 

            allData.forEach(row => {
                const rowDate = new Date(row.date);
                const rYear = rowDate.getFullYear().toString();
                const rMonth = String(rowDate.getMonth() + 1).padStart(2, '0');
                
                if (rYear === filterYear && rMonth === filterMonth) {
                    const amt = Number(row.amount);
                    monthlyTransactions.push(row); 
                    
                    if (row.type === 'income') {
                        totalIncome += amt;
                    } else if (row.type === 'expense') {
                        totalExpense += amt;
                        categoryTotals[row.category] = (categoryTotals[row.category] || 0) + amt;
                        
                        const day = rowDate.getDate();
                        dailyCategoryTotals[day][row.category] = (dailyCategoryTotals[day][row.category] || 0) + amt;
                    }
                }
            });

            document.getElementById('income-total').innerText = totalIncome.toLocaleString('th-TH', {minimumFractionDigits: 0, maximumFractionDigits: 2});
            document.getElementById('expense-total').innerText = totalExpense.toLocaleString('th-TH', {minimumFractionDigits: 0, maximumFractionDigits: 2});

            const netBalance = totalIncome - totalExpense;
            const balanceEl = document.getElementById('net-balance');
            const balanceCardEl = document.getElementById('balance-card');
            const balanceIconEl = document.getElementById('balance-icon');

            const formattedNet = Math.abs(netBalance).toLocaleString('th-TH', {minimumFractionDigits: 0, maximumFractionDigits: 2});
            
            if (netBalance > 0) {
                balanceEl.innerText = '+ ฿' + formattedNet;
                balanceEl.className = 'text-xl font-bold text-green-600';
                balanceCardEl.className = 'glass-card rounded-2xl p-5 flex items-center justify-between border-l-4 border-green-500';
                balanceIconEl.className = 'w-10 h-10 rounded-full flex items-center justify-center text-lg bg-green-100 text-green-600';
                balanceIconEl.innerHTML = '<i class="fa-solid fa-arrow-trend-up"></i>';
            } else if (netBalance < 0) {
                balanceEl.innerText = '- ฿' + formattedNet;
                balanceEl.className = 'text-xl font-bold text-red-500';
                balanceCardEl.className = 'glass-card rounded-2xl p-5 flex items-center justify-between border-l-4 border-red-500';
                balanceIconEl.className = 'w-10 h-10 rounded-full flex items-center justify-center text-lg bg-red-100 text-red-500';
                balanceIconEl.innerHTML = '<i class="fa-solid fa-arrow-trend-down"></i>';
            } else {
                balanceEl.innerText = '฿0';
                balanceEl.className = 'text-xl font-bold text-gray-800';
                balanceCardEl.className = 'glass-card rounded-2xl p-5 flex items-center justify-between border-l-4 border-gray-400';
                balanceIconEl.className = 'w-10 h-10 rounded-full flex items-center justify-center text-lg bg-gray-100 text-gray-600';
                balanceIconEl.innerHTML = '<i class="fa-solid fa-equals"></i>';
            }

            // [อัปเดตสีตามรูปภาพ] 
            const sortedCategories = Object.entries(categoryTotals).sort((a, b) => b[1] - a[1]);
            const colorPalette = [
                '#008b8b', // Teal / Dark Cyan
                '#00a8cc', // Light Blue
                '#008fa7', // Medium Blue
                '#0b4c5f', // Dark Navy Blue
                '#a87b51', // Warm Brown
                '#ead5c2'  // Pale Beige
            ];
            
            const categoryColors = {};
            sortedCategories.forEach((item, index) => {
                categoryColors[item[0]] = colorPalette[index % colorPalette.length];
            });

            renderDonutChart(sortedCategories, totalExpense, categoryColors);
            renderBarChart(dailyCategoryTotals, daysInMonth, categoryColors, sortedCategories);
            renderTransactionDetails(monthlyTransactions); 
        }

        function renderDonutChart(sortedCategories, totalExpense, categoryColors) {
            const ctx = document.getElementById('expenseChart').getContext('2d');
            
            const labels = sortedCategories.map(item => item[0]);
            const dataValues = sortedCategories.map(item => item[1]);
            const backgroundColors = labels.map(label => categoryColors[label]);

            const listContainer = document.getElementById('categoryList');
            listContainer.innerHTML = '';
            
            if (sortedCategories.length === 0) {
                listContainer.innerHTML = '<p class="text-center text-sm text-gray-400 py-4">ไม่มีข้อมูลรายจ่ายในเดือนนี้</p>';
            } else {
                sortedCategories.forEach((item) => {
                    const catName = item[0];
                    const amount = item[1];
                    const percent = totalExpense > 0 ? ((amount / totalExpense) * 100).toFixed(1) : 0;
                    const color = categoryColors[catName]; 
                    
                    listContainer.innerHTML += `
                        <div class="flex justify-between items-center py-2 border-b border-gray-100 last:border-0">
                            <span class="text-sm text-gray-600 flex items-center">
                                <span class="w-3 h-3 inline-block rounded-full mr-2" style="background-color: ${color}; border: 1px solid #e5e7eb;"></span>
                                ${catName} <span class="text-xs text-gray-400 ml-1">${percent}%</span>
                            </span>
                            <span class="text-sm font-semibold text-gray-800">฿${amount.toLocaleString('th-TH', {minimumFractionDigits: 0, maximumFractionDigits: 2})}</span>
                        </div>
                    `;
                });
            }

            if (donutChartInstance) donutChartInstance.destroy();

            donutChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels.length > 0 ? labels : ['ไม่มีข้อมูล'],
                    datasets: [{
                        data: dataValues.length > 0 ? dataValues : [1],
                        backgroundColor: dataValues.length > 0 ? backgroundColors : ['#f3f4f6'],
                        borderWidth: 2,
                        borderColor: '#ffffff'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: { callbacks: { label: function(context) {
                            let label = context.label || '';
                            if (label !== 'ไม่มีข้อมูล') {
                                label += ': ฿' + context.raw.toLocaleString();
                            }
                            return label;
                        }}}
                    },
                    cutout: '75%'
                }
            });
        }

        function renderBarChart(dailyCategoryTotals, daysInMonth, categoryColors, sortedCategories) {
            const ctx = document.getElementById('dailyChart').getContext('2d');
            
            const labels = Array.from({length: daysInMonth}, (_, i) => (i + 1).toString());

            const datasets = sortedCategories.map(catItem => {
                const catName = catItem[0];
                const dataValues = Array.from({length: daysInMonth}, (_, i) => dailyCategoryTotals[i + 1][catName] || 0);

                return {
                    label: catName,
                    data: dataValues,
                    backgroundColor: categoryColors[catName],
                    borderWidth: 0,
                    barPercentage: 0.8
                };
            });

            if (barChartInstance) barChartInstance.destroy();

            barChartInstance = new Chart(ctx, {
                type: 'bar',
                data: { labels: labels, datasets: datasets },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: { 
                            mode: 'index',
                            intersect: false,
                            callbacks: { 
                                title: (ctx) => `วันที่ ${ctx[0].label}`,
                                label: (ctx) => {
                                    if (ctx.raw > 0) return `${ctx.dataset.label}: ฿${ctx.raw.toLocaleString()}`;
                                    return null; 
                                }
                            } 
                        }
                    },
                    scales: {
                        x: {
                            stacked: true, 
                            grid: { display: false },
                            ticks: { maxTicksLimit: 31, font: { size: 10 }, color: '#6b7280' }
                        },
                        y: {
                            stacked: true, 
                            beginAtZero: true,
                            grid: { color: '#f3f4f6' },
                            border: { display: false },
                            ticks: { font: { size: 10 }, callback: (val) => val.toLocaleString() }
                        }
                    }
                }
            });
        }

        function renderTransactionDetails(transactions) {
            const container = document.getElementById('transactionDetails');
            container.innerHTML = '';

            if (transactions.length === 0) {
                container.innerHTML = '<p class="text-center text-sm text-gray-400 py-4">ยังไม่มีรายการบันทึกในเดือนนี้</p>';
                return;
            }

            transactions.sort((a, b) => new Date(b.date) - new Date(a.date));

            transactions.forEach(tx => {
                const isIncome = tx.type === 'income';
                const amountColor = isIncome ? 'text-green-600' : 'text-red-500';
                const sign = isIncome ? '+' : '-';
                
                const userBadge = tx.user ? `<span class="inline-block px-2 py-0.5 ml-2 bg-gray-100 text-gray-500 text-[10px] rounded">${tx.user}</span>` : '';
                const noteText = tx.note ? tx.note : '-';

                // เพิ่ม onclick เข้าไปใน Div เพื่อให้กดแล้วส่งเลขแถว (sheetRow) ไปทำงาน
                container.innerHTML += `
                    <div onclick="editRecord(${tx.sheetRow})" class="transaction-row cursor-pointer flex justify-between items-center p-3 border border-gray-100 rounded-xl bg-white hover:bg-blue-50 transition-colors shadow-sm">
                        <div class="flex items-center gap-3 w-3/4 pointer-events-none">
                            <div class="w-12 h-12 flex flex-col items-center justify-center rounded-lg bg-gray-50 border border-gray-100 text-gray-600 flex-shrink-0">
                                <span class="text-sm font-semibold">${new Date(tx.date).getDate()}</span>
                                <span class="text-[10px]">${new Date(tx.date).toLocaleDateString('th-TH', { month: 'short' })}</span>
                            </div>
                            
                            <div class="overflow-hidden w-full">
                                <p class="text-sm font-medium text-gray-800 truncate">${tx.category} ${userBadge}</p>
                                <p class="text-xs text-gray-400 truncate">${noteText}</p>
                            </div>
                        </div>
                        
                        <div class="text-right flex-shrink-0 ml-2 pointer-events-none">
                            <p class="text-sm font-semibold ${amountColor}">${sign}฿${Number(tx.amount).toLocaleString('th-TH', {minimumFractionDigits: 0, maximumFractionDigits: 2})}</p>
                        </div>
                    </div>
                `;
            });
        }

        window.onload = () => { fetchData(); };
    </script>
</body>
</html>
