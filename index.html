<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Budget Tracker</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Chart.js DataLabels Plugin -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f8; }
        .glass-card { background: #ffffff; border: 1px solid #eef0f2; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.02); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        .transaction-row:active { transform: scale(0.99); }
    </style>
</head>
<body class="text-gray-800 antialiased pb-20">

    <!-- Header -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-10 px-6 py-4 flex justify-between items-center shadow-sm">
        <h1 class="text-xl font-bold tracking-tight text-gray-800"><i class="fa-solid fa-wallet mr-2 text-blue-600"></i>Family Budget</h1>
        <div class="text-sm font-medium text-gray-500" id="currentDate"></div>
    </header>

    <main class="max-w-3xl mx-auto p-4 mt-2">
        
        <!-- Tab Navigation -->
        <div class="flex bg-gray-200 p-1 rounded-xl mb-6 shadow-inner">
            <button onclick="switchTab('dashboard')" id="tab-dashboard" class="flex-1 py-2 rounded-lg text-sm font-bold transition-all bg-white shadow-sm text-gray-800">📊 Dashboard</button>
            <button onclick="switchTab('add')" id="tab-add" class="flex-1 py-2 rounded-lg text-sm font-medium text-gray-500 transition-all hover:text-gray-800">✏️ เพิ่ม/แก้ไขรายการ</button>
        </div>

        <!-- ================= DASHBOARD VIEW ================= -->
        <div id="view-dashboard" class="space-y-6">
            
            <!-- เลือกเดือน -->
            <div class="flex justify-between items-center bg-white p-3 rounded-xl border border-gray-200 shadow-sm">
                <label class="text-sm font-bold text-gray-600"><i class="fa-regular fa-calendar-days mr-2"></i>เลือกเดือน</label>
                <div class="flex gap-2">
                    <select id="monthSelect" class="p-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-blue-500 font-medium">
                        <option value="01">มกราคม</option>
                        <option value="02">กุมภาพันธ์</option>
                        <option value="03">มีนาคม</option>
                        <option value="04">เมษายน</option>
                        <option value="05">พฤษภาคม</option>
                        <option value="06">มิถุนายน</option>
                        <option value="07">กรกฎาคม</option>
                        <option value="08">สิงหาคม</option>
                        <option value="09">กันยายน</option>
                        <option value="10">ตุลาคม</option>
                        <option value="11">พฤศจิกายน</option>
                        <option value="12">ธันวาคม</option>
                    </select>
                    <select id="yearSelect" class="p-2 bg-gray-50 border border-gray-200 rounded-lg text-sm focus:outline-none focus:border-blue-500 font-medium">
                        <!-- ปีจะสร้างโดยอัตโนมัติจาก JS -->
                    </select>
                </div>
            </div>

            <!-- Summary Section -->
            <div>
                <!-- การเงินสะสมรวม (Net Worth) -->
                <div class="rounded-2xl p-6 mb-4 bg-gradient-to-br from-slate-800 to-black text-white shadow-lg relative overflow-hidden">
                    <div class="absolute top-0 right-0 opacity-10 text-9xl transform translate-x-1/4 -translate-y-1/4">
                        <i class="fa-solid fa-coins"></i>
                    </div>
                    <div class="relative z-10">
                        <div class="flex justify-between items-center mb-2">
                            <p class="text-sm text-slate-300 font-medium">เงินคงเหลือรวมสะสม (ถึงสิ้นเดือนที่เลือก)</p>
                            <i class="fa-solid fa-vault text-slate-400"></i>
                        </div>
                        <h2 class="text-3xl md:text-4xl font-bold tracking-tight" id="total-accumulated-balance">฿0</h2>
                        <div class="mt-4 pt-4 border-t border-slate-700 flex justify-between items-center text-xs font-medium">
                            <span class="text-slate-400">ยอดยกมาจากเดือนก่อนหน้า: <span id="previous-balance" class="text-slate-200 ml-1">฿0</span></span>
                        </div>
                    </div>
                </div>

                <!-- รายรับ - รายจ่าย ประจำเดือน -->
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div class="glass-card rounded-2xl p-5 border-l-4 border-green-500">
                        <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">รายรับ (เดือนนี้)</p>
                        <h3 class="text-xl font-bold text-green-600">฿<span id="income-total">0</span></h3>
                    </div>
                    <div class="glass-card rounded-2xl p-5 border-l-4 border-red-500">
                        <p class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-1">รายจ่าย (เดือนนี้)</p>
                        <h3 class="text-xl font-bold text-red-500">฿<span id="expense-total">0</span></h3>
                    </div>
                </div>

                <!-- สถานะเดือนนี้ -->
                <div id="balance-card" class="glass-card rounded-2xl p-4 flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-gray-500 mb-1">ผลประกอบการเดือนนี้</p>
                        <h3 class="text-lg font-bold" id="net-balance">฿0</h3>
                    </div>
                    <div id="balance-icon" class="w-10 h-10 rounded-full flex items-center justify-center text-lg">
                        <i class="fa-solid fa-equals"></i>
                    </div>
                </div>
            </div>

            <!-- Chart: Daily Trend -->
            <div class="glass-card rounded-2xl p-5">
                <h3 class="text-md font-bold mb-2 text-gray-700">รายจ่ายรายวัน (บาท)</h3>
                <div class="relative h-72 w-full">
                    <canvas id="dailyChart"></canvas>
                </div>
            </div>

            <!-- Chart: Category Donut -->
            <div class="glass-card rounded-2xl p-5">
                <h3 class="text-md font-bold mb-2 text-gray-700">สัดส่วนค่าใช้จ่ายตามหมวดหมู่</h3>
                <div class="relative h-64 w-full mb-4">
                    <canvas id="expenseChart"></canvas>
                </div>
                <div id="categoryList" class="space-y-2"></div>
            </div>

            <!-- Transaction Details -->
            <div class="glass-card rounded-2xl p-5">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-md font-bold text-gray-700">รายการบันทึก (เดือนนี้)</h3>
                    <span class="text-xs font-medium text-blue-600 bg-blue-50 px-2 py-1 rounded">แตะเพื่อแก้ไข</span>
                </div>
                <div id="transactionDetails" class="space-y-3">
                    <!-- รายการจะถูกสร้างด้วย JS -->
                </div>
            </div>

            <button onclick="fetchData()" class="w-full py-4 bg-white hover:bg-gray-50 text-gray-600 font-bold rounded-xl text-sm transition-colors border border-gray-200 shadow-sm">
                <i class="fa-solid fa-rotate-right mr-2"></i>รีเฟรชข้อมูล
            </button>
        </div>

        <!-- ================= ADD / EDIT RECORD VIEW ================= -->
        <div id="view-add" class="hidden">
            <div class="glass-card rounded-2xl p-6">
                <h2 id="formTitle" class="text-lg font-bold mb-4 text-gray-800 border-b pb-3">เพิ่มรายการใหม่</h2>
                
                <form id="recordForm" class="space-y-5">
                    <div>
                        <label class="block text-sm font-bold text-gray-600 mb-2">วันที่ทำรายการ</label>
                        <input type="date" id="recordDate" class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-gray-50" required>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-bold text-gray-600 mb-2">ประเภท</label>
                            <select id="type" onchange="updateCategoryOptions()" class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500 bg-gray-50 font-medium" required>
                                <option value="expense">รายจ่าย</option>
                                <option value="income">รายรับ</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-600 mb-2">หมวดหมู่</label>
                            <select id="category" class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500 bg-gray-50 font-medium" required></select>
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-600 mb-2">จำนวนเงิน (บาท)</label>
                        <input type="number" id="amount" placeholder="0.00" step="0.01" class="w-full p-3 border border-gray-200 rounded-xl text-xl font-bold focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 bg-gray-50 text-blue-600" required>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-600 mb-2">สมาชิกที่ทำรายการ</label>
                        <select id="user" class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500 bg-gray-50 font-medium" required>
                            <option value="ครอบครัว-ส่วนรวม">ครอบครัว-ส่วนรวม</option>
                            <option value="คุณพ่อ-ส่วนตัว">คุณพ่อ-ส่วนตัว</option>
                            <option value="คุณแม่-ส่วนตัว">คุณแม่-ส่วนตัว</option>
                            <option value="คุณลูก-ส่วนตัว">คุณลูก-ส่วนตัว</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-gray-600 mb-2">บันทึกเพิ่มเติม (ถ้ามี)</label>
                        <input type="text" id="note" placeholder="เช่น ค่าทางด่วน, ข้าวมันไก่..." class="w-full p-3 border border-gray-200 rounded-xl focus:outline-none focus:border-blue-500 bg-gray-50">
                    </div>
                    <div class="flex gap-3 mt-6 pt-4 border-t border-gray-100">
                        <button type="button" id="deleteBtn" onclick="deleteRecordPrompt()" class="hidden flex-1 py-4 bg-red-50 border border-red-200 text-red-600 font-bold rounded-xl hover:bg-red-100 transition-all shadow-sm">ลบ</button>
                        <button type="button" id="cancelEditBtn" onclick="resetFormMode()" class="hidden flex-1 py-4 bg-gray-100 text-gray-600 font-bold rounded-xl hover:bg-gray-200 transition-all shadow-sm">ยกเลิก</button>
                        <button type="submit" id="submitBtn" class="flex-[2] py-4 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700 transition-all shadow-md">บันทึกข้อมูล</button>
                    </div>
                </form>
            </div>
        </div>
    </main>

    <!-- JS Logic -->
    <script>
        // !!!!!!!!!!! เอา URL จาก Google Apps Script มาใส่ตรงนี้ !!!!!!!!!!!
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwIRpGgZ2qiXCCgSzt89zwrc7lfsW-jrTSrAhN5IQa2BkXlw1XO2ul2UE8cA5W2P5hh/exec';
        
        Chart.register(ChartDataLabels);

        let donutChartInstance = null;
        let barChartInstance = null;
        let allData = []; 
        let editMode = false;
        let editRowId = null;

        // กำหนดสีเฉพาะสำหรับแต่ละหมวดหมู่ (Distinct Colors)
        const categoryColorMap = {
            'อาหาร': '#f97316',          // ส้ม
            'เดินทาง': '#2563eb',        // น้ำเงิน
            'บิล': '#eab308',           // เหลือง
            'ของใช้ในบ้าน': '#10b981',     // เขียว
            'ของใช้ส่วนตัว': '#8b5cf6',     // ม่วง
            'ประกัน/ออม': '#06b6d4',       // ฟ้า
            'ผ่อนรถ': '#ec4899',         // ชมพู
            'ผ่อนบ้าน/คอนโด': '#6366f1',   // คราม
            'จ่ายหนี้บัตร/คืนเงิน': '#ef4444', // แดง
            'อื่นๆ': '#64748b'            // เทา
        };
        const fallbackColors = ['#f97316', '#2563eb', '#10b981', '#eab308', '#8b5cf6', '#ec4899', '#06b6d4', '#6366f1', '#ef4444', '#64748b'];

        function getCategoryColor(categoryName, index) {
            return categoryColorMap[categoryName] || fallbackColors[index % fallbackColors.length];
        }

        const categoriesByType = {
            expense: [
                { value: 'อาหาร', text: 'อาหาร/เครื่องดื่ม' },
                { value: 'เดินทาง', text: 'เดินทาง' },
                { value: 'บิล', text: 'ค่าน้ำ/ไฟ/เน็ต' },
                { value: 'ของใช้ในบ้าน', text: 'ของใช้ในบ้าน' },
                { value: 'ของใช้ส่วนตัว', text: 'ของใช้ส่วนตัว' },
                { value: 'ประกัน/ออม', text: 'ประกันชีวิต/เงินออม' },
                { value: 'ผ่อนรถ', text: 'ผ่อนรถ' },
                { value: 'ผ่อนบ้าน/คอนโด', text: 'ผ่อนบ้าน/คอนโด' },
                { value: 'จ่ายหนี้บัตร/คืนเงิน', text: '💳 จ่ายหนี้/คืนเงินกู้' },
                { value: 'อื่นๆ', text: 'อื่นๆ' }
            ],
            income: [
                { value: 'รายได้', text: 'รายได้/เงินเดือน' },
                { value: 'ธุรกิจ', text: 'รายได้ธุรกิจ/ฟรีแลนซ์' },
                { value: 'การลงทุน', text: 'เงินปันผล/การลงทุน' },
                { value: 'ดึงเงินเก็บ', text: '💰 ดึงเงินเก็บมาใช้' },
                { value: 'เงินกู้ยืม', text: '💳 รูดบัตร/ยืมเงินมาใช้' },
                { value: 'อื่นๆ', text: 'อื่นๆ' }
            ]
        };

        const headerOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('currentDate').innerText = new Date().toLocaleDateString('th-TH', headerOptions);

        const today = new Date();
        const localDateString = today.toLocaleDateString('en-CA'); 
        document.getElementById('recordDate').value = localDateString;
        
        const currentMonthString = String(today.getMonth() + 1).padStart(2, '0');
        document.getElementById('monthSelect').value = currentMonthString;

        document.getElementById('monthSelect').addEventListener('change', renderDashboard);
        document.getElementById('yearSelect').addEventListener('change', renderDashboard);

        function parseRowDate(dateStr) {
            if (typeof dateStr === 'string' && dateStr.includes('-')) {
                const parts = dateStr.split('T')[0].split('-');
                if (parts.length === 3) return new Date(parseInt(parts[0]), parseInt(parts[1]) - 1, parseInt(parts[2]));
            }
            return new Date(dateStr);
        }

        function updateCategoryOptions() {
            const type = document.getElementById('type').value;
            const categorySelect = document.getElementById('category');
            const previousValue = categorySelect.value;
            categorySelect.innerHTML = '';
            categoriesByType[type].forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat.value;
                opt.textContent = cat.text;
                categorySelect.appendChild(opt);
            });
            if (Array.from(categorySelect.options).some(opt => opt.value === previousValue)) categorySelect.value = previousValue;
        }

        function switchTab(tab) {
            if (tab === 'dashboard') {
                document.getElementById('view-dashboard').classList.remove('hidden');
                document.getElementById('view-add').classList.add('hidden');
                document.getElementById('tab-dashboard').className = 'flex-1 py-2 rounded-lg text-sm font-bold transition-all bg-white shadow-sm text-gray-800';
                document.getElementById('tab-add').className = 'flex-1 py-2 rounded-lg text-sm font-medium text-gray-500 transition-all hover:text-gray-800';
                if(allData.length === 0) fetchData(); 
            } else {
                document.getElementById('view-dashboard').classList.add('hidden');
                document.getElementById('view-add').classList.remove('hidden');
                document.getElementById('tab-add').className = 'flex-1 py-2 rounded-lg text-sm font-bold transition-all bg-white shadow-sm text-gray-800';
                document.getElementById('tab-dashboard').className = 'flex-1 py-2 rounded-lg text-sm font-medium text-gray-500 transition-all hover:text-gray-800';
            }
        }

        function resetFormMode() {
            editMode = false;
            editRowId = null;
            document.getElementById('recordForm').reset();
            document.getElementById('recordDate').value = localDateString;
            updateCategoryOptions();
            document.getElementById('formTitle').innerText = 'เพิ่มรายการใหม่';
            document.getElementById('submitBtn').innerHTML = 'บันทึกข้อมูล';
            document.getElementById('cancelEditBtn').classList.add('hidden');
            document.getElementById('deleteBtn').classList.add('hidden');
        }

        function editRecord(sheetRow) {
            const record = allData.find(r => r.sheetRow === sheetRow);
            if (!record) return;
            const d = parseRowDate(record.date);
            document.getElementById('recordDate').value = d.toLocaleDateString('en-CA');
            document.getElementById('type').value = record.type;
            updateCategoryOptions(); 
            document.getElementById('category').value = record.category;
            document.getElementById('amount').value = record.amount;
            document.getElementById('user').value = record.user || 'ครอบครัว-ส่วนรวม';
            document.getElementById('note').value = record.note || '';

            editMode = true;
            editRowId = sheetRow;
            document.getElementById('formTitle').innerText = `แก้ไขรายการ (แถวที่ ${sheetRow})`;
            document.getElementById('submitBtn').innerHTML = '<i class="fa-solid fa-pen mr-2"></i>อัปเดตข้อมูล';
            document.getElementById('cancelEditBtn').classList.remove('hidden');
            document.getElementById('deleteBtn').classList.remove('hidden');

            switchTab('add');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function deleteRecordPrompt() {
            if (!editRowId) return;
            if (confirm(`คุณต้องการลบรายการแถวที่ ${editRowId} ใช่หรือไม่?`)) {
                const btn = document.getElementById('deleteBtn');
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>ลบ...';
                btn.disabled = true;
                const data = { action: 'delete', row: editRowId };

                fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) })
                .then(res => res.json())
                .then(resData => {
                    alert('ลบรายการเรียบร้อยแล้ว!');
                    resetFormMode();
                    btn.disabled = false;
                    btn.innerHTML = originalText;
                    fetchData();
                    switchTab('dashboard');
                })
                .catch(err => alert('เกิดข้อผิดพลาด กรุณาลองใหม่'));
            }
        }

        document.getElementById('recordForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>กำลังบันทึก...';
            btn.disabled = true;

            const data = {
                action: editMode ? 'update' : 'add', 
                row: editRowId, 
                date: document.getElementById('recordDate').value,
                type: document.getElementById('type').value,
                category: document.getElementById('category').value,
                amount: parseFloat(document.getElementById('amount').value),
                user: document.getElementById('user').value,
                note: document.getElementById('note').value
            };

            fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) })
            .then(res => res.json())
            .then(resData => {
                alert(editMode ? 'อัปเดตรายการเรียบร้อยแล้ว!' : 'บันทึกข้อมูลเรียบร้อยแล้ว!');
                resetFormMode(); 
                btn.disabled = false;
                fetchData(); 
                switchTab('dashboard'); 
            })
            .catch(err => {
                alert('เกิดข้อผิดพลาด กรุณาลองใหม่');
                btn.innerHTML = originalText;
                btn.disabled = false;
            });
        });

        function updateYearSelectOptions() {
            const yearSelect = document.getElementById('yearSelect');
            const currentYear = new Date().getFullYear();
            const years = new Set([currentYear, currentYear - 1]);
            
            allData.forEach(row => {
                if (row.date) {
                    const y = parseRowDate(row.date).getFullYear();
                    if (!isNaN(y) && y > 2000) years.add(y);
                }
            });
            const sortedYears = Array.from(years).sort((a, b) => b - a);
            const previousValue = yearSelect.value || currentYear.toString();
            
            yearSelect.innerHTML = '';
            sortedYears.forEach(y => {
                const opt = document.createElement('option');
                opt.value = y.toString();
                opt.textContent = y.toString();
                yearSelect.appendChild(opt);
            });
            yearSelect.value = previousValue;
        }

        function fetchData() {
            const btn = document.querySelector('button[onclick="fetchData()"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>กำลังดึงข้อมูล...';

            fetch(SCRIPT_URL)
                .then(res => res.json())
                .then(data => {
                    allData = data.map((item, index) => { return { ...item, sheetRow: index + 2 }; }); 
                    updateYearSelectOptions();
                    renderDashboard(); 
                    btn.innerHTML = originalText;
                })
                .catch(err => {
                    console.error(err);
                    btn.innerHTML = originalText;
                });
        }

        function renderDashboard() {
            const filterMonthStr = document.getElementById('monthSelect').value;
            const filterYearStr = document.getElementById('yearSelect').value;
            const filterMonth = parseInt(filterMonthStr);
            const filterYear = parseInt(filterYearStr);
            
            let previousBalance = 0; 
            let totalIncome = 0; 
            let totalExpense = 0; 
            
            let categoryTotals = {};
            let dailyCategoryTotals = {};
            const daysInMonth = new Date(filterYear, filterMonth, 0).getDate();
            for (let i = 1; i <= daysInMonth; i++) dailyCategoryTotals[i] = {};

            let monthlyTransactions = []; 

            allData.forEach(row => {
                const rowDate = parseRowDate(row.date);
                const rYear = rowDate.getFullYear();
                const rMonth = rowDate.getMonth() + 1;
                const amt = Number(row.amount);
                
                if (rYear < filterYear || (rYear === filterYear && rMonth < filterMonth)) {
                    if (row.type === 'income') previousBalance += amt;
                    else if (row.type === 'expense') previousBalance -= amt;
                } else if (rYear === filterYear && rMonth === filterMonth) {
                    monthlyTransactions.push(row); 
                    if (row.type === 'income') {
                        totalIncome += amt;
                    } else if (row.type === 'expense') {
                        totalExpense += amt;
                        categoryTotals[row.category] = (categoryTotals[row.category] || 0) + amt;
                        const day = rowDate.getDate();
                        if(dailyCategoryTotals[day]) dailyCategoryTotals[day][row.category] = (dailyCategoryTotals[day][row.category] || 0) + amt;
                    }
                }
            });

            const currentMonthNet = totalIncome - totalExpense;
            const totalAccumulated = previousBalance + currentMonthNet;
            const formatMoney = (val) => Math.abs(val).toLocaleString('th-TH', {minimumFractionDigits: 0, maximumFractionDigits: 2});

            const accumEl = document.getElementById('total-accumulated-balance');
            if (totalAccumulated >= 0) {
                accumEl.innerText = `฿${formatMoney(totalAccumulated)}`;
                accumEl.className = 'text-3xl md:text-4xl font-bold tracking-tight text-white';
            } else {
                accumEl.innerText = `- ฿${formatMoney(totalAccumulated)}`;
                accumEl.className = 'text-3xl md:text-4xl font-bold tracking-tight text-red-400';
            }

            const prevEl = document.getElementById('previous-balance');
            prevEl.innerText = previousBalance >= 0 ? `฿${formatMoney(previousBalance)}` : `- ฿${formatMoney(previousBalance)}`;
            prevEl.className = previousBalance >= 0 ? 'text-slate-200 ml-1' : 'text-red-300 ml-1';

            document.getElementById('income-total').innerText = totalIncome.toLocaleString('th-TH', {minimumFractionDigits: 0, maximumFractionDigits: 2});
            document.getElementById('expense-total').innerText = totalExpense.toLocaleString('th-TH', {minimumFractionDigits: 0, maximumFractionDigits: 2});

            const balanceEl = document.getElementById('net-balance');
            const balanceCardEl = document.getElementById('balance-card');
            const balanceIconEl = document.getElementById('balance-icon');
            
            if (currentMonthNet > 0) {
                balanceEl.innerText = '+ ฿' + formatMoney(currentMonthNet);
                balanceEl.className = 'text-lg font-bold text-green-600';
                balanceCardEl.className = 'glass-card rounded-2xl p-4 flex items-center justify-between border-l-4 border-green-500 bg-green-50/30';
                balanceIconEl.className = 'w-10 h-10 rounded-full flex items-center justify-center text-lg bg-green-100 text-green-600';
                balanceIconEl.innerHTML = '<i class="fa-solid fa-arrow-trend-up"></i>';
            } else if (currentMonthNet < 0) {
                balanceEl.innerText = '- ฿' + formatMoney(currentMonthNet);
                balanceEl.className = 'text-lg font-bold text-red-500';
                balanceCardEl.className = 'glass-card rounded-2xl p-4 flex items-center justify-between border-l-4 border-red-500 bg-red-50/30';
                balanceIconEl.className = 'w-10 h-10 rounded-full flex items-center justify-center text-lg bg-red-100 text-red-500';
                balanceIconEl.innerHTML = '<i class="fa-solid fa-arrow-trend-down"></i>';
            } else {
                balanceEl.innerText = '฿0';
                balanceEl.className = 'text-lg font-bold text-gray-800';
                balanceCardEl.className = 'glass-card rounded-2xl p-4 flex items-center justify-between border-l-4 border-gray-400';
                balanceIconEl.className = 'w-10 h-10 rounded-full flex items-center justify-center text-lg bg-gray-100 text-gray-600';
                balanceIconEl.innerHTML = '<i class="fa-solid fa-equals"></i>';
            }

            const sortedCategories = Object.entries(categoryTotals).sort((a, b) => b[1] - a[1]);
            const categoryColors = {};
            sortedCategories.forEach((item, index) => { 
                categoryColors[item[0]] = getCategoryColor(item[0], index); 
            });

            renderDonutChart(sortedCategories, totalExpense, categoryColors);
            renderBarChart(dailyCategoryTotals, daysInMonth, categoryColors, sortedCategories);
            renderTransactionDetails(monthlyTransactions); 
        }

        // ====== 1. กราฟโดนัท (พร้อม Callout Labels และเส้นชี้) ======
        function renderDonutChart(sortedCategories, totalExpense, categoryColors) {
            const ctx = document.getElementById('expenseChart').getContext('2d');
            const labels = sortedCategories.map(item => item[0]);
            const dataValues = sortedCategories.map(item => item[1]);
            const backgroundColors = labels.map(label => categoryColors[label]);

            const listContainer = document.getElementById('categoryList');
            listContainer.innerHTML = '';
            
            if (sortedCategories.length === 0) {
                listContainer.innerHTML = '<p class="text-center text-sm text-gray-400 py-4">ไม่มีข้อมูลรายจ่ายในเดือนนี้</p>';
            } else {
                sortedCategories.forEach((item) => {
                    const catName = item[0];
                    const amount = item[1];
                    const percent = totalExpense > 0 ? ((amount / totalExpense) * 100).toFixed(1) : 0;
                    listContainer.innerHTML += `
                        <div class="flex justify-between items-center py-2 border-b border-gray-100 last:border-0">
                            <span class="text-sm text-gray-600 flex items-center font-medium">
                                <span class="w-3 h-3 inline-block rounded-full mr-2" style="background-color: ${categoryColors[catName]}; border: 1px solid #e5e7eb;"></span>
                                ${catName} <span class="text-xs text-gray-400 ml-2">${percent}%</span>
                            </span>
                            <span class="text-sm font-bold text-gray-800">฿${amount.toLocaleString('th-TH', {minimumFractionDigits: 0, maximumFractionDigits: 2})}</span>
                        </div>
                    `;
                });
            }

            if (donutChartInstance) donutChartInstance.destroy();

            // Plugin วาดเส้น Callout Line เชื่อมจากชิ้นโดนัทไปยังตัวเลข
            const donutCalloutLines = {
                id: 'donutCalloutLines',
                afterDraw(chart) {
                    const { ctx } = chart;
                    const meta = chart.getDatasetMeta(0);
                    if (!meta || !meta.data || meta.data.length === 0) return;
                    if (chart.data.labels[0] === 'ไม่มีข้อมูล') return;

                    meta.data.forEach((element) => {
                        const { x, y, startAngle, endAngle, outerRadius } = element;
                        const midAngle = startAngle + (endAngle - startAngle) / 2;
                        
                        // จุดเริ่มต้นที่ขอบโดนัท
                        const x1 = x + Math.cos(midAngle) * outerRadius;
                        const y1 = y + Math.sin(midAngle) * outerRadius;
                        
                        // จุดปลายทางยื่นออกมานอกโดนัท
                        const x2 = x + Math.cos(midAngle) * (outerRadius + 10);
                        const y2 = y + Math.sin(midAngle) * (outerRadius + 10);

                        ctx.save();
                        ctx.beginPath();
                        ctx.moveTo(x1, y1);
                        ctx.lineTo(x2, y2);
                        ctx.strokeStyle = '#cbd5e1';
                        ctx.lineWidth = 1.5;
                        ctx.stroke();
                        ctx.restore();
                    });
                }
            };

            donutChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels.length > 0 ? labels : ['ไม่มีข้อมูล'],
                    datasets: [{
                        data: dataValues.length > 0 ? dataValues : [1],
                        backgroundColor: dataValues.length > 0 ? backgroundColors : ['#f1f5f9'],
                        borderWidth: 2,
                        borderColor: '#ffffff'
                    }]
                },
                plugins: [donutCalloutLines],
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    layout: {
                        padding: { top: 20, bottom: 20, left: 35, right: 35 } // เว้นพื้นที่ให้ Callout
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: { callbacks: { label: function(context) {
                            let label = context.label || '';
                            if (label !== 'ไม่มีข้อมูล') label += ': ฿' + context.raw.toLocaleString();
                            return label;
                        }}},
                        datalabels: {
                            anchor: 'end',
                            align: 'end',
                            offset: 8,
                            color: '#334155',
                            font: { weight: 'bold', size: 11 },
                            formatter: (value, context) => {
                                if (context.chart.data.labels[0] === 'ไม่มีข้อมูล') return '';
                                let sum = 0;
                                let dataArr = context.chart.data.datasets[0].data;
                                dataArr.forEach(data => { sum += data; });
                                return ((value * 100) / sum).toFixed(1) + "%";
                            }
                        }
                    },
                    cutout: '60%'
                }
            });
        }

        // ====== 2. กราฟแท่ง (พร้อม Legend และ Distinct Colors) ======
        function renderBarChart(dailyCategoryTotals, daysInMonth, categoryColors, sortedCategories) {
            const ctx = document.getElementById('dailyChart').getContext('2d');
            const labels = Array.from({length: daysInMonth}, (_, i) => (i + 1).toString());

            const datasets = sortedCategories.map(catItem => {
                const catName = catItem[0];
                const dataValues = Array.from({length: daysInMonth}, (_, i) => dailyCategoryTotals[i + 1][catName] || 0);
                return {
                    label: catName,
                    data: dataValues,
                    backgroundColor: categoryColors[catName],
                    borderWidth: 0,
                    borderRadius: 2,
                    barPercentage: 0.8
                };
            });

            // Plugin สำหรับตัวเลขยอดรวมเหนือแท่งกราฟ
            const topLabelsPlugin = {
                id: 'topLabels',
                afterDatasetsDraw(chart) {
                    const { ctx } = chart;
                    const formatter = new Intl.NumberFormat('en-US', { notation: "compact", maximumFractionDigits: 1 });
                    
                    chart.data.labels.forEach((label, i) => {
                        let total = 0;
                        let topY = chart.chartArea.bottom; 
                        let hasData = false;
                        
                        chart.data.datasets.forEach((dataset, j) => {
                            const meta = chart.getDatasetMeta(j);
                            if (!meta.hidden && dataset.data[i] > 0) {
                                total += dataset.data[i];
                                if (meta.data[i] && meta.data[i].y < topY) {
                                    topY = meta.data[i].y;
                                }
                                hasData = true;
                            }
                        });
                        
                        if (hasData && total > 0) {
                            const xPos = chart.getDatasetMeta(0).data[i].x;
                            ctx.save();
                            ctx.textAlign = 'center';
                            ctx.textBaseline = 'bottom';
                            ctx.fillStyle = '#64748b';
                            ctx.font = 'bold 10px "Segoe UI", sans-serif';
                            ctx.fillText(formatter.format(total), xPos, topY - 3);
                            ctx.restore();
                        }
                    });
                }
            };

            if (barChartInstance) barChartInstance.destroy();

            barChartInstance = new Chart(ctx, {
                type: 'bar',
                data: { labels: labels, datasets: datasets },
                plugins: [topLabelsPlugin],
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        // เปิดใช้งาน Legend กำกับหมวดหมู่ด้านบนกราฟ
                        legend: { 
                            display: true,
                            position: 'top',
                            align: 'center',
                            labels: {
                                boxWidth: 10,
                                boxHeight: 10,
                                usePointStyle: true,
                                pointStyle: 'circle',
                                font: { size: 11, family: "'Segoe UI', sans-serif" },
                                color: '#475569',
                                padding: 12
                            }
                        },
                        datalabels: { display: false },
                        tooltip: { 
                            mode: 'index',
                            intersect: false,
                            callbacks: { 
                                title: (ctx) => `วันที่ ${ctx[0].label}`,
                                label: (ctx) => {
                                    if (ctx.raw > 0) return `${ctx.dataset.label}: ฿${ctx.raw.toLocaleString()}`;
                                    return null; 
                                }
                            } 
                        }
                    },
                    scales: {
                        x: { stacked: true, grid: { display: false }, ticks: { maxTicksLimit: 31, font: { size: 10 }, color: '#94a3b8' } },
                        y: { stacked: true, beginAtZero: true, grid: { color: '#f1f5f9', borderDash: [5, 5] }, border: { display: false }, ticks: { font: { size: 10 }, color: '#94a3b8', callback: (val) => val.toLocaleString() } }
                    }
                }
            });
        }

        function renderTransactionDetails(transactions) {
            const container = document.getElementById('transactionDetails');
            container.innerHTML = '';
            if (transactions.length === 0) {
                container.innerHTML = '<p class="text-center text-sm text-gray-400 py-4 bg-gray-50 rounded-xl">ยังไม่มีรายการบันทึกในเดือนนี้</p>';
                return;
            }
            transactions.sort((a, b) => parseRowDate(b.date) - parseRowDate(a.date));
            transactions.forEach(tx => {
                const isIncome = tx.type === 'income';
                const amountColor = isIncome ? 'text-green-600' : 'text-red-500';
                const sign = isIncome ? '+' : '-';
                const userBadge = tx.user ? `<span class="inline-block px-2 py-0.5 ml-2 bg-slate-100 text-slate-600 text-[10px] rounded font-medium border border-slate-200">${tx.user}</span>` : '';
                const noteText = tx.note ? tx.note : '-';
                const tDate = parseRowDate(tx.date);

                container.innerHTML += `
                    <div onclick="editRecord(${tx.sheetRow})" class="transaction-row cursor-pointer flex justify-between items-center p-3 border border-gray-100 rounded-xl bg-white hover:bg-blue-50 hover:border-blue-100 transition-colors shadow-sm">
                        <div class="flex items-center gap-3 w-3/4 pointer-events-none">
                            <div class="w-12 h-12 flex flex-col items-center justify-center rounded-lg ${isIncome ? 'bg-green-50 border-green-100 text-green-700' : 'bg-red-50 border-red-100 text-red-700'} border flex-shrink-0">
                                <span class="text-sm font-bold">${tDate.getDate()}</span>
                                <span class="text-[10px] font-medium">${tDate.toLocaleDateString('th-TH', { month: 'short' })}</span>
                            </div>
                            <div class="overflow-hidden w-full">
                                <p class="text-sm font-bold text-gray-800 truncate">${tx.category} ${userBadge}</p>
                                <p class="text-xs text-gray-400 truncate mt-0.5">${noteText}</p>
                            </div>
                        </div>
                        <div class="text-right flex-shrink-0 ml-2 pointer-events-none">
                            <p class="text-sm font-bold ${amountColor}">${sign}฿${Number(tx.amount).toLocaleString('th-TH', {minimumFractionDigits: 0, maximumFractionDigits: 2})}</p>
                        </div>
                    </div>
                `;
            });
        }

        window.onload = () => { updateCategoryOptions(); fetchData(); };
    </script>
